<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brandog - Brand Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --background: #ffffff;
        --surface: #f4f4f5; /* zinc-100 */
        --border: #e4e4e7; /* zinc-200 */
        --primary: #09090b; /* zinc-950 */
        --secondary: #71717a; /* zinc-500 */
        --accent: #18181b; /* zinc-900 */
        --inverse: #ffffff;
        --stripe-color: #f4f4f5; /* Light mode stripe */
      }
      
      .dark {
        --background: #0C0C0C; /* Updated to #0C0C0C */
        --surface: #0C0C0C;    /* Match background */
        --border: #27272a;     /* zinc-800 */
        --primary: #fafafa;    /* zinc-50 */
        --secondary: #a1a1aa;  /* zinc-400 */
        --accent: #fafafa;     /* zinc-50 */
        --inverse: #0C0C0C;
        --stripe-color: #1a1a1a; /* Dark mode stripe */
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--background);
        color: var(--primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Diagonal stripe pattern for calendar */
      .bg-striped {
        background-color: var(--background);
        background-image: repeating-linear-gradient(
          45deg,
          var(--stripe-color),
          var(--stripe-color) 2px,
          var(--background) 2px,
          var(--background) 8px
        );
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 0px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--secondary);
      }
      
      .recharts-cartesian-grid-horizontal line,
      .recharts-cartesian-grid-vertical line {
        stroke: var(--border);
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: '#0C0C0C',
              surface: '#0C0C0C',
              border: '#27272a',
              primary: '#fafafa',
              secondary: '#a1a1aa',
              accent: '#fafafa',
              inverse: '#0C0C0C',
            },
            borderRadius: {
              'none': '0',
              'sm': '0',
              DEFAULT: '0',
              'md': '0',
              'lg': '0',
              'xl': '0',
              '2xl': '0',
              '3xl': '0',
              'full': '9999px',
            }
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.3.1",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
